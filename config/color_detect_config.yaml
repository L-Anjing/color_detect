# color_detect 双摄像头视觉信标配置
# 相机格式/分辨率由 camera_stream/config/camera_stream.yaml 管理。
/color_detect_node:
  ros__parameters:
    # 双摄像头话题
    camera_topic_left:  "/cam_left/image_raw"
    camera_topic_right: "/cam_right/image_raw"

    resize_width: 640

    # ── CLAHE（自适应直方图均衡） ──
    clahe:
      enabled: true
      clip_limit: 2.0
      grid_size: 8

    hsv:
      v_threshold: 200
      s_threshold_white: 40
      saturation_threshold: 100   # S 通道阈值（过滤白色灯管）
      hue_tolerance: 12

    morph:
      open_size: 3
      close_size: 7
      dilation_size: 3

    beacon:
      n_segments: 2
      sync_color: "YELLOW"
      color_wait: "RED"
      color_go: "GREEN"
      min_aspect_ratio: 3.0
      min_area: 50
      uniformity_threshold: 0.3   # 亮度均匀性门槛（std/mean）

    filter:
      temporal_window: 5
      debounce_frames: 3
      lost_timeout_ms: 200

    # 单目粗定位参数
    # x 向右，y 向下，z 向前，单位 m；左右内参按各自相机标定结果填写。
    pose:
      left:
        fx: 600.0
        fy: 600.0
        cx: 640.0
        cy: 360.0
      right:
        fx: 600.0
        fy: 600.0
        cx: 640.0
        cy: 360.0
      beacon_real_length_m: 0.20

    debug: false
