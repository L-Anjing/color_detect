# Main color_detect pipeline.
# Flow: low-exposure frame -> bright strip candidate -> mean HSV color check
# -> WAIT if red exists, else GO -> serial send.
/color_detect_node:
  ros__parameters:
    direct_camera:
      # Single camera device path; use the stable udev name if possible.
      device: "/dev/cam_right"
      # Requested capture width. 1280 keeps detail; lower values reduce CPU.
      width: 1280
      # Requested capture height. Match camera mode with width/fps.
      height: 720
      # Requested FPS. 30 is responsive; 15 reduces CPU but adds latency.
      fps: 30
      # Camera format. MJPG is usually faster over USB than raw YUYV.
      input_format: "MJPG"
      # Driver buffer count. 1 is low latency; 2-4 is smoother but delayed.
      buffer_size: 1
      # Exposure mode. For this camera, 1 is manual; wrong mode may ignore exposure_time.
      auto_exposure: 1
      # Manual exposure. Lower is darker/less blur; raise slightly if far red is too dim.
      exposure_time: 1

    serial:
      # Serial output device. Sends only CA CA 00/01 AA BB, no receive handling.
      port: "/dev/detection"
      # Serial baudrate. Must match receiver; 115200 is the current protocol default.
      baudrate: 115200

    display:
      # Show OpenCV debug window. true for tuning; false for headless/CPU saving.
      enabled: true
      # Debug window scale. 0.5 smaller, 1.0 full size; affects display only.
      scale: 0.75

    # Detector internal resize width. 480 is a good balance; larger sees detail but costs CPU.
    resize_width: 480
    # Exit if no frame arrives for this many seconds; watchdog/autostart can restart it.
    input_timeout_sec: 10.0

    clahe:
      # CLAHE only enhances candidate ROI color stats, not frame/box detection.
      enabled: true
      # CLAHE clip limit. 1-3 is mild; higher brightens weak colors but can amplify noise.
      clip_limit: 2.0
      # CLAHE grid size. 8 is normal; smaller is more local/noisy, larger is smoother.
      grid_size: 8

    color:
      # HSV ROI blur kernel. 3 reduces pixel noise; 0 disables; 5 is smoother but less sharp.
      gaussian_kernel: 3
      # Saturation gain in ROI. Higher makes weak red easier; too high may create false red.
      saturation_gain: 1.8
      # Brightness gain in ROI. Raise for far/dim light; lower if reflections trigger.
      value_gain: 1.5

    hsv:
      # General V threshold for legacy color checks. Lower catches dim pixels; higher rejects noise.
      v_threshold: 18
      # Minimum V counted in color stats. Lower helps distance; too low includes black background.
      v_min_bright: 16
      # Max S treated as white/low-saturation. Higher makes pale pixels white, not colored.
      s_threshold_white: 40
      # Minimum S for colored stats. Lower catches washed-out red; higher rejects gray noise.
      s_min_for_color: 30
      # Global S reference threshold. Lower is more sensitive; higher is cleaner.
      saturation_threshold: 24
      # Hue tolerance for non-red reference colors. Larger is looser; smaller is stricter.
      hue_tolerance: 22
      # Dilation for linking bright core and color halo. Larger joins gaps but may merge clutter.
      white_core_link_dilation: 15
      # Upper cap for GUI-like bright-strip threshold. Lower catches dim strips; higher rejects clutter.
      candidate_bright_threshold: 180
      # Dynamic V threshold uses local_max - delta. Larger delta is more sensitive to far/dim strips.
      candidate_threshold_delta: 45
      # Min contour area / ROI area. Raise to remove tiny floating boxes; lower for very far strips.
      candidate_min_area_ratio: 0.001
      # Min contour fill ratio. Raise to reject broken/sparse blobs; lower accepts thin segmented LEDs.
      candidate_min_fill_ratio: 0.06
      # Min long/short ratio. Raise to require long strips; lower accepts short/near-vertical blobs.
      candidate_min_aspect_ratio: 2.0
      yellow:
        # Yellow H low reference. OpenCV H is 0-179; not used for final WAIT.
        h_low: 18
        # Yellow H high reference. Widen only for debug/classification experiments.
        h_high: 52
        # Yellow minimum S reference. Lower catches pale yellow, higher rejects white.
        s_low: 32
        # Yellow minimum V reference. Lower catches dim yellow, higher rejects noise.
        v_low: 20
      green:
        # Green H low reference. Kept for debug, not the GO/WAIT decision.
        h_low: 45
        # Green H high reference. Kept for debug, not the GO/WAIT decision.
        h_high: 80
        # Green minimum S reference. Lower catches pale green, higher is cleaner.
        s_low: 30
        # Green minimum V reference. Lower catches dim green, higher rejects noise.
        v_low: 20
      red:
        # Red high-end H low. Red wraps around 179/0, so this covers 172-179.
        h_low: 172
        # Red low-end H high. This covers 0-8; widen to 10-12 if red looks orange.
        h_high: 8
        # Red minimum S for WAIT. Lower catches washed-out red; higher rejects reflections.
        s_low: 35
        # Nominal red V. Used as an upper bound for adaptive low-V threshold.
        v_low: 40
        # Absolute lowest red V. 10-15 helps far red; too low may count dark noise.
        v_floor: 12
        # Min red-pixel ratio in candidate ROI. Lower (0.015) is sensitive; higher (0.03) is cleaner.
        min_ratio: 0.02

    roi:
      # Limit search to ROI. Keep true when ceiling LEDs or floor reflections exist.
      enabled: true
      # ROI top as image-height ratio. Increase to ignore ceiling; decrease if strip appears high.
      y_min_ratio: 0.35
      # ROI bottom as image-height ratio. Lower to ignore floor/robot body; 1.0 uses bottom edge.
      y_max_ratio: 1.00
      # ROI left as image-width ratio. Raise if left side has fixed clutter.
      x_min_ratio: 0.00
      # ROI right as image-width ratio. Lower if right side has fixed clutter.
      x_max_ratio: 1.00

    morph:
      # Opening kernel. Larger removes small specks but can erase far/thin LEDs.
      open_size: 3
      # Closing kernel. Larger bridges LED gaps; too large merges nearby reflections.
      close_size: 9
      # Final dilation kernel. Larger joins broken strips; too large fattens boxes.
      dilation_size: 5
      # Closing iterations. 2 is GUI-like; raise only if strips split apart.
      close_iterations: 2
      # Dilation iterations. 1 is usually enough; raise only for badly broken candidates.
      dilate_iterations: 1

    beacon:
      # Max angle difference for merging fragments. Larger merges more, but may join unrelated lines.
      merge_angle_tolerance_deg: 12.0
      # Along-strip merge gap in strip-thickness units. Raise if one strip is split into pieces.
      merge_axis_gap_ratio: 4.0
      # Perpendicular merge gap in strip-thickness units. Raise cautiously; reflections can merge.
      merge_perp_gap_ratio: 1.5
      # Sampling segment count. Single red-strip mode should stay 1.
      n_segments: 1
      # Trigger color. RED means WAIT; no RED means GO.
      color_stop: "RED"
      # Absolute min contour area. Raise to reject tiny noise; lower for very far small strips.
      min_contour_area: 12
      # Strip min aspect ratio. Raise for stricter long rectangles; lower for short visible strips.
      min_strip_aspect_ratio: 2.0
      # Min contour/minRect fill. Lower accepts sparse LEDs; higher rejects broken/noisy blobs.
      min_rect_fill_ratio: 0.06
      # ROI sample height relative to strip thickness. Raise to include color halo; too high adds background.
      halo_sample_scale: 2.8
      # Dominant color ratio reference. Lower is sensitive; higher is stricter.
      color_consistency_threshold: 0.30

    output:
      # Frames needed to enter WAIT after red appears. 1 reacts fastest; 2-3 reduces false WAIT.
      stop_frames: 1
      # Frames needed to return GO after red disappears. Larger prevents WAIT/GO flicker.
      go_frames: 18
